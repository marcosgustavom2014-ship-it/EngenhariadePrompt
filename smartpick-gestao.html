<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPick Pro - Gestão Integrada</title>
    <style>
        :root {
            --primary: #0066cc;
            --danger: #d9534f;
            --success: #5cb85c;
            --warning: #f0ad4e;
            --bg: #faf9f6; /* Off-white */
            --card-bg: #ffffff;
            --border: #e6e4e0;
            --text: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* PAINEL DE PEDIDOS */
        .admin-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--bg);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #f1eee9; font-size: 11px; color: #777; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }

        .input-ordem {
            width: 45px;
            padding: 5px;
            border: 1px solid var(--border);
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }
        .grande { background: #ffebeb; color: var(--danger); border: 1px solid #feb2b2; }

        .btn-ordenar {
            background: var(--text);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .btn-atribuir {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* BARRA LATERAL EQUIPE */
        .sidebar {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            height: fit-content;
        }

        .colaborador-card {
            padding: 15px;
            border-radius: 10px;
            background: var(--bg);
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .colab-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .btn-banir {
            background: none;
            border: 1px solid var(--danger);
            color: var(--danger);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-banir:hover { background: var(--danger); color: white; }

        .status-dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            background: var(--success);
        }
    </style>
</head>
<body>

    <div class="layout">
        <!-- ÁREA CENTRAL: PEDIDOS E ORDENAÇÃO -->
        <main class="admin-panel">
            <div class="header-panel">
                <div>
                    <h2>Gestão de Pedidos iFood</h2>
                    <p style="font-size: 12px; color: #888;">Defina a ordem e indique o colaborador manualmente.</p>
                </div>
                <button class="btn-ordenar" onclick="reordenarTabela()">🔄 Organizar por Prioridade</button>
            </div>

            <table id="tabela-pedidos">
                <thead>
                    <tr>
                        <th>Prioridade</th>
                        <th>ID Pedido</th>
                        <th>Complexidade</th>
                        <th>Itens</th>
                        <th>Indicar Colaborador</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="number" class="input-ordem" value="2"></td>
                        <td><strong>#2050</strong></td>
                        <td><span class="status-badge grande">MUITO GRANDE</span></td>
                        <td>32 itens</td>
                        <td>
                            <select class="select-colab" style="padding: 5px; border-radius: 4px;">
                                <option>João (Livre)</option>
                                <option>Ana (Livre)</option>
                                <option>Carlos (Em Rota)</option>
                            </select>
                        </td>
                        <td><button class="btn-atribuir" onclick="enviar(this)">Atribuir</button></td>
                    </tr>
                    <tr>
                        <td><input type="number" class="input-ordem" value="1"></td>
                        <td><strong>#2051</strong></td>
                        <td><span class="status-badge" style="background:#eef; color:blue;">MÉDIO</span></td>
                        <td>08 itens</td>
                        <td>
                            <select class="select-colab" style="padding: 5px; border-radius: 4px;">
                                <option>João (Livre)</option>
                                <option>Ana (Livre)</option>
                                <option>Carlos (Em Rota)</option>
                            </select>
                        </td>
                        <td><button class="btn-atribuir" onclick="enviar(this)">Atribuir</button></td>
                    </tr>
                </tbody>
            </table>
        </main>

        <!-- BARRA LATERAL: EQUIPE E CONTROLE DE BANIMENTO -->
        <aside class="sidebar">
            <h3 style="margin-bottom: 20px; font-size: 16px;">Controle de Equipe</h3>
            
            <div id="equipe-lista">
                <div class="colaborador-card">
                    <div class="colab-header">
                        <strong>João</strong>
                        <button class="btn-banir" onclick="banir(this)">BANIR</button>
                    </div>
                    <small><span class="status-dot"></span> Disponível agora</small>
                </div>

                <div class="colaborador-card">
                    <div class="colab-header">
                        <strong>Ana</strong>
                        <button class="btn-banir" onclick="banir(this)">BANIR</button>
                    </div>
                    <small><span class="status-dot"></span> Disponível agora</small>
                </div>

                <div class="colaborador-card" style="opacity: 0.6;">
                    <div class="colab-header">
                        <strong>Carlos</strong>
                        <button class="btn-banir" onclick="banir(this)">BANIR</button>
                    </div>
                    <small><span class="status-dot" style="background: var(--warning);"></span> Em separação...</small>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // Função para organizar as linhas pela numeração da prioridade
        function reordenarTabela() {
            const table = document.getElementById("tabela-pedidos");
            const tbody = table.tBodies[0];
            const linhas = Array.from(tbody.rows);

            linhas.sort((a, b) => {
                const valA = parseInt(a.querySelector('.input-ordem').value) || 99;
                const valB = parseInt(b.querySelector('.input-ordem').value) || 99;
                return valA - valB;
            });

            linhas.forEach(linha => tbody.appendChild(linha));
        }

        // Função para remover pedido da lista após atribuir
        function enviar(btn) {
            const linha = btn.closest('tr');
            const id = linha.cells[1].innerText;
            alert("Sucesso! O pedido " + id + " foi enviado ao colaborador.");
            linha.remove();
        }

        // Função para remover (banir) o colaborador da lista lateral
        function banir(btn) {
            const card = btn.closest('.colaborador-card');
            const nome = card.querySelector('strong').innerText;
            if(confirm("Deseja realmente banir " + nome + " do sistema?")) {
                card.style.border = "1px solid red";
                card.style.background = "#fff5f5";
                card.innerHTML = "<p style='color:red; font-size:12px; font-weight:bold;'>USUÁRIO BANIDO</p>";
                setTimeout(() => { card.remove(); }, 2000);
            }
        }
    </script>
</body>
</html>
